services:
  postgres:
    image: postgres:16-alpine
    container_name: mycourse-postgres
    environment:
      POSTGRES_DB: mycourse
      POSTGRES_USER: mycourse
      POSTGRES_PASSWORD: mycourse_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycourse -d mycourse"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: mycourse-backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:8080
      DATABASE_URL: postgres://mycourse:mycourse_password@postgres:5432/mycourse
    ports:
      - "4001:4000"
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: mycourse-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres-data:
